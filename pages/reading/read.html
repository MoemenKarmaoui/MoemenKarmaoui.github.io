<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="read.css">
    <link rel="icon" href="../../resources/pictures/icons/read.png">
    <title>Read</title>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <a href="../qeution/q.html" class="skip">Skip</a>
            <div>
                <h2>Vous serez directement redirigé vers la section des questions pendant : </h2>
                <span class="timer"><h2 class="min"> </h2><h2 class="sec"> </h2><h2 class="ms"> </h2></span>

            </div>
        </div>
        <div class="elements_container">
            <div class="story_main">
                <img src="" alt="" id="ProfilePic" >
                <div class="instory">
                    <h1 id="title">bouzaien</h1>
                    <p class="res"></p>
                </div>
            </div>
            <div class="text-content">
                <p class="TheNovel"></p>
            </div>
        </div>
    </div>
    <script >
        document.querySelector(".res").textContent = localStorage.getItem("resumeValue");
        document.querySelector("#title").textContent = localStorage.getItem("titleValue");
        document.querySelector(".TheNovel").textContent = localStorage.getItem("NovelValue");
        document.querySelector("#ProfilePic").src = localStorage.getItem("PictureValue");
        let countdawn = 900000;
        let startTime = Date.now(); 
        let count  = setInterval(() => {
            let currentTime = Date.now();
            let time= currentTime - startTime;
            let current = countdawn - time;
            let min = Math.floor(current / ( 1000 * 60));
            let sec =  Math.floor(current % (1000*60) / 1000 );
            let ms = Math.floor(current % (1000*60) % 1000 );
            document.querySelector(".min").textContent = min + " : \u00A0" ;
            document.querySelector(".sec").textContent = sec  + " : \u00A0" ;
            document.querySelector(".ms").textContent = ms;
            if ( current < 0){
                clearInterval(count);
                window.location.href = "../qeution/q.html"
            }
        },1);
    </script>
</body>
</html>
